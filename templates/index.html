<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL_Downloader</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 15px;
        }

        button {
            padding: 12px 25px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

<h1>🎬 ASL_Downloader</h1>

<p>Download your media easily</p>

<form action="/download" method="POST">

<input 
type="text" 
name="url" 
placeholder="Paste media URL here"
required>

<br>

<button type="submit">
Download
</button>

</form>

</div>

</body>
</html>
